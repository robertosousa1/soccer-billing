packages:
  - "apps/*"
  - "packages/*"

# pnpm 11 bloqueia por padrão pacotes publicados há pouco tempo (proteção contra supply-chain
# attack). O relógio deste ambiente está adiantado, então pacotes legítimos recém-publicados
# (ex.: bullmq) são marcados como "muito novos" por engano. Desligado aqui; reavaliar se isso
# também acontecer em CI/produção com data real.
minimumReleaseAge: 0

# Versão única para libs compartilhadas entre pacotes — evita drift quando se atualiza
# uma e esquece as outras. Cada package.json referencia via "catalog:".
catalog:
  typescript: ^5.5.4
  eslint: ^8.57.0
  "@types/node": ^20.14.15
  jest: ^29.7.0
  ts-jest: ^29.2.5
  "@types/jest": ^29.5.12

# Scripts de build de dependências nativas conhecidas e necessárias para a stack
# (Prisma client/engines, agente nativo do New Relic, ssh2/cpu-features do testcontainers,
# esbuild do vite/vitest, protobufjs, unrs-resolver do eslint-config-next).
allowBuilds:
  '@newrelic/fn-inspect': true
  '@newrelic/native-metrics': true
  '@prisma/client': true
  '@prisma/engines': true
  cpu-features: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  protobufjs: true
  ssh2: true
  unrs-resolver: true
